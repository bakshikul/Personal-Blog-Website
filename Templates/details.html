<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ blog.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#eef2ff,#f8f9fa);
            min-height:100vh;
        }

        .blog-container{
            max-width:950px;
            margin:60px auto;
        }

        .blog-card{
            background:#fff;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.15);
            transition:.3s;
        }

        .blog-card:hover{
            transform:translateY(-6px);
            box-shadow:0 20px 45px rgba(0,0,0,.2);
        }

        .blog-image{
            width:100%;
            height:450px;
            object-fit:cover;
        }

        .blog-content{
            padding:40px;
        }

        .blog-title{
            font-size:2.7rem;
            font-weight:700;
            color:#212529;
            margin-bottom:15px;
        }

        .meta{
            display:flex;
            justify-content:space-between;
            flex-wrap:wrap;
            margin-bottom:25px;
        }

        .author{
            display:inline-block;
            background:#0d6efd;
            color:#fff;
            padding:8px 18px;
            border-radius:30px;
            font-size:15px;
            font-weight:600;
        }

        .date{
            color:#6c757d;
            font-size:15px;
            margin-top:10px;
        }

        hr{
            margin:25px 0;
        }

        .description{
            font-size:18px;
            line-height:1.9;
            color:#444;
            text-align:justify;
        }

        .back-btn{
            margin-top:35px;
            padding:10px 30px;
            border-radius:30px;
            font-weight:bold;
            transition:.3s;
        }

        .back-btn:hover{
            transform:translateY(-2px);
        }

        @media(max-width:768px){

            .blog-content{
                padding:25px;
            }

            .blog-title{
                font-size:2rem;
            }

            .blog-image{
                height:260px;
            }

            .meta{
                flex-direction:column;
                gap:10px;
            }

            .description{
                font-size:16px;
            }

        }
        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 12px 0;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary) !important;
        }

        .nav-link {
            color: #374151 !important;
            font-weight: 600;
            margin-left: 10px;
            padding: 8px 14px !important;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary) !important;
        }

    </style>

</head>

<body>
<nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Personal Blog</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    {% if 'user' not in session %}

                    <li class="nav-item">
                        <a class="nav-link" href="/login">Sign In</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/register">Sign Up</a>
                    </li>

                    {% else %}

                    <li class="nav-item">
                        <a class="nav-link" href="/create-blog">Create Blog</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>

                    {% endif %}

                </ul>
            </div>
        </div>
    </nav>
<div class="container blog-container">

    <div class="blog-card">
        <div class="blog-content">

            <h1 class="blog-title">
                {{ blog.title }}
            </h1>

            <div class="meta">

                <span class="author">
                    ✍ {{ blog.author }}
                </span>

                <span class="date">
                    📅 {{ blog.createdat.strftime('%d %B %Y') }}
                </span>

            </div>

            <hr>

            <div class="description">
                {{ blog.description }}
            </div>
            <form action="{{url_for('deleteblog' , blog_id = blog.id)}}"  method="POST">
                <button type="submit" class="btn btn-danger">Delete Blog</button>
            </form>

            <a href="{{ url_for('home') }}" class="btn btn-primary back-btn">
                ← Back to Blogs
            </a>

        </div>

    </div>

</div>

</body>
</html>
