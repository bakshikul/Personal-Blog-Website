{% extends "base.html" %}
{% block title %}Register User{% endblock %}
{% block content %} <style>
  .register-container {
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    background-color: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }

  .register-container h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-weight: 600;
  }

  .form-control {
    border-radius: 8px;
    padding: 10px;
  }

  .form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 8px rgba(13, 110, 253, 0.25);
  }

  .form-check {
    margin-top: 15px;
    margin-bottom: 20px;
  }

  .btn-primary {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    transition: 0.3s ease;
  }

  label {
    font-weight: 500;
    margin-bottom: 5px;
  }
</style>
<div class="register-container">
  <h1>Register User</h1>
  <form action="/register" method="POST">
    <div class="mb-3"> <label for="username" class="form-label">Email Address</label> <input type="email" id="username"
        name="username" class="form-control" required>
      <div class="form-text"> We'll never share your email with anyone else. </div>
    </div>
    <div class="mb-3"> <label for="password" class="form-label">Password</label> <input type="password" id="password"
        name="password" class="form-control" required> </div>
    <div class="mb-3 form-check"> <input type="checkbox" class="form-check-input" id="check"> <label
        class="form-check-label" for="check"> Check me out </label> </div> <button type="submit"
      class="btn btn-primary"> Register </button>
  </form>
</div>
{% endblock %}
