{% extends "base.html" %} {% block title %}Create Blog{% endblock %} {% block
css %}
<style>
  .create-blog-wrapper {
    max-width: 800px;
    margin: 0 auto;
  }

  .create-blog-title {
    text-align: center;
    margin-bottom: 30px;
    color: #111827;
    font-weight: 700;
  }

  .blog-form {
    background: #ffffff;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .blog-form .form-label {
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
  }

  .blog-form input[type="text"],
  .blog-form textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #f9fafb;
  }

  .blog-form input[type="text"]:focus,
  .blog-form textarea:focus {
    outline: none;
    border-color: #6366f1;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
  }

  .blog-form textarea {
    min-height: 220px;
    resize: vertical;
  }

  .form-check {
    margin: 20px 0;
  }

  .form-check-input {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .btn-create {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    transition: all 0.3s ease;
  }

  .btn-create:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
  }

  .btn-create:active {
    transform: translateY(0);
  }

  @media (max-width: 768px) {
    .blog-form {
      padding: 20px;
    }

    .create-blog-title {
      font-size: 1.8rem;
    }
  }
</style>
{% endblock %} {% block content %}
<div class="create-blog-wrapper">
  <h1 class="create-blog-title">Create Blog</h1>
  <form class="blog-form" method="POST">
    <div class="mb-4">
      <label class="form-label">Blog Title</label>
      <input
        type="text"
        name="title"
        class="form-control"
        placeholder="Enter your blog title"
        required
      />
    </div>
    <div class="mb-4">
      <label class="form-label">Blog Description</label>
      <textarea
        name="description"
        class="form-control"
        placeholder="Write your blog content here..."
        required
      ></textarea>
    </div>
    <button type="submit" class="btn-create">Create Blog</button>
  </form>
</div>
{% endblock %}
